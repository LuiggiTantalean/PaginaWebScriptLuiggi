<!DOCTYPE html>
<html>

<head>
    <meta content="text/html; charset=utf‐8" />
    <script>
        let nombre = "Luiggi";
        let edad = 19;
        let programar = "yes";
        console.log("mi nombre es " + nombre + " mi edad es " + edad + " me gusta programar " + programar);
        alert("mi nombre es " + nombre + " mi edad es " + edad + " me gusta programar " + programar);

        function fsaludo() {
            let nombre = document.getElementById("nombre").value;
            alert(" Hola " + nombre);
        }


        function fsumar() {
            let num_1 = parseInt(document.getElementById("num_1").value);
            let num_2 = parseInt(document.getElementById("num_2").value);
            alert(" La suma de " + num_1 + " y " + num_2 + " es " + (num_1 + num_2));
            alert(num_1 + num_2);
            document.getElementById(" resultado ").textContent = num_1 + num_2;
        }

        function ffondocolor() {
            let color = document.getElementById("nombre").value;
            document.body.style.backgroundColor = color;
        }


        function fcambiarparrafo() {
            let cambiar_parrafo = document.getElementById("nombre").value;
            document.getElementById("parrafo_inicial").textContent = cambiar_parrafo;
        }



        function fincrementar() {
            let incrementar = parseInt(document.getElementById("numero").textContent);
            document.getElementById("numero").textContent = incrementar + 1;

        }


        function fdecrementar() {
            let decrementar = parseInt(document.getElementById("numero").textContent);
            document.getElementById("numero").textContent = decrementar - 1;

        }

        function fresetear() {
            let resetear = parseInt(document.getElementById("numero").textContent);
            document.getElementById("numero").textContent = resetear = 0;

        }

    </script>

</head>

<body>
    <noscript>
        <p>Esta página requiere JavaScript para su correcto funcionamiento.
            Compruebe si JavaScript está deshabilitado en el navegador.</p>
    </noscript>
    <p id="parrafo_inicial">Un script con la frase más famosa de la programación.</p>
    <label>Introduzca su nombre:</label>
    <input type="text" name="nombre" id="nombre" />
    <input type="button" value="Enviar" onclick="fsaludo()" />
    <input type="number" name="num_1" id="num_1" />
    <input type="number" name="num_2" id="num_2" />
    <input type="button" value="sumar" onclick="fsumar()" />
    <label id="resultado"></label>
    <input type="button" value="cambio_color" id="cambio_color" onclick="ffondocolor()" />
    <input type="button" value="cambiar_parrafo" id="cambiar_parrafo" onclick="fcambiarparrafo()" />
    <br><br>
    <label id="numero">0</label>
    <br>
    <input type="button" value="incrementar" id="incrementar" onclick="fincrementar()" />
    <input type="button" value="decrementar" id="decrementar" onclick="fdecrementar()" />
    <input type="reset" value="resetear" id="resetear" onclick="fresetear()" />
</body>

</html>
