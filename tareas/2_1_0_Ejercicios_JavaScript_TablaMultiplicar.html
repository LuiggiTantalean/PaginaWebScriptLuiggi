<!DOCTYPE html >
<html>
<head>
    <meta content="text/html; charset=utf‐8" />
    
    
    <script>

        function fmultiplicar(){
            let numero = parseInt(document.getElementById("numero").value);
            let resultado = " "
            for (i = 1; i <= 12; i++) {
                console.log (i);
                console.log (numero + " x " + i + " = " + ( numero * i));
                resultado = resultado + numero + " x " + i + " = " + ( numero * i) + " <br> ";
            } 
            document.getElementById("parrafo").innerHTML = resultado;
        }


    </script>
</head>

<body>

    <label>Introducir numero:</label>
    <input type="number" name="numero" id="numero" />
    <input type="button" value="Multiplicar" onclick="fmultiplicar()" />
    <p id="parrafo">resultados de la multiplicaciones</p>


</body>
</html>
