<!DOCTYPE html >
<html>
<head>
    <meta content="text/html; charset=utf‐8" />
    
    <script>

        function fpiramide(){
            let numero = parseInt(document.getElementById("numero").value);
            let resultado = " "
            for (i = 1; i <= numero; i++) {
                for (j = 1; j <= i; j++) {
                    resultado = resultado + "*";
                }  
                resultado = resultado + "<br>";
            } 
            console.log(resultado);
            document.getElementById("parrafo").innerHTML = resultado;
        }


    </script>
</head>

<body>

    <label>Piramide</label>
    <input type="number" name="numero" id="numero" />
    <input type="button" value="Multiplicar" onclick="fpiramide()" />
    <p id="parrafo">resultados de la multiplicaciones</p>


</body>
</html>
