<!DOCTYPE html>
<html>

<head>
    <meta content="text/html; charset=utf‐8" />
    <script>
        function alerta_mayor_valor() {
            let num_1 = parseInt(document.getElementById("num_1").value);
            let num_2 = parseInt(document.getElementById("num_2").value);

            if (num_1 > num_2) { alert(" El numero " + num_1 + " es mayor que el numero " + num_2); }
            else if (num_2 > num_1) { alert(" El  numero " + num_2 + " es mayor que el numero " + num_1); }
            else { alert(" Ambos numero son iguales "); }
        }
        function positivo_negativo() {
            let numero = parseInt(document.getElementById("numero").value);

            if (numero > 0) { alert(" El numero " + numero + " es positivo "); }
            else if (numero < 0) { alert(" El numero " + numero + " es negativo "); }
            else if (numero = 0) { alert("El numero es igual a 0"); }
        }

        function edad_comprobacion() {
            let edad = parseInt(document.getElementById("edad").value);

            if (edad < 18) { alert(" Eres menor de 18 años "); }
            else if (edad = 18) { alert(" Tienes 18 años "); }
            else if (edad > 18 && edad < 25) { alert(" Tienes mas de  18 años  y menos de 25 años "); }
            else if (edad >= 25 && edad <= 35) { alert(" Estas entre los 25 y 35 años "); }
            else if (edad > 35) { alert(" Tienes mas de 35 años "); }
        }

    </script>
</head>

<body>
    <input type="text" name="num_1" id="num_1">
    <input type="text" name="num_2" id="num_2">
    <input type="button" value="mayor_valor" id="mayor_valor" onclick="alerta_mayor_valor()">

    <input type="number" name="numero" id="numero">
    <input type="button" value="indicar_positivo_negativo" id="indicar_positivo_negativo" onclick="positivo_negativo()">

    <input type="number" name="edad" id="edad">
    <input type="button" value="comprobar_edad" id="comprobar_edad" onclick="edad_comprobacion()">
</body>

</html>
